// ── TREND HELPERS ──────────────────────────────────────────
const ONE_WEEK=7*24*60*60*1000;
const ONE_MONTH=30*24*60*60*1000;

function calcTrend(current,previous){
  if(previous===0&&current===0)return{pct:0,dir:"flat"};
  if(previous===0)return{pct:100,dir:"up"};
  const pct=Math.round(((current-previous)/previous)*100);
  return{pct:Math.abs(pct),dir:pct>0?"up":pct<0?"down":"flat"};
}

function TrendBadge({current,previous,suffix=""}){
  const{pct,dir}=calcTrend(current,previous);
  const color=dir==="up"?B.green:dir==="down"?B.red:"#888";
  const arrow=dir==="up"?"↑":dir==="down"?"↓":"→";
  if(previous===0&&current===0)return null;
  return(
    <span style={{fontSize:11,color,fontWeight:700,marginLeft:6,display:"inline-flex",alignItems:"center",gap:2}}>
      {arrow}{pct}%{suffix} <span style={{fontSize:9,opacity:0.7}}>vs last wk</span>
    </span>
  );
}

function MiniSparkline({data,color}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data,1);
  const w=80,h=28,pts=data.length;
  const coords=data.map((v,i)=>`${(i/(pts-1))*w},${h-(v/max)*(h-4)+2}`).join(" ");
  return(
    <svg width={w} height={h} style={{display:"block"}}>
      <polyline points={coords} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.8"/>
      <circle cx={(((pts-1)/(pts-1))*w)} cy={h-(data[data.length-1]/max)*(h-4)+2} r="3" fill={color}/>
    </svg>
  );
}

    <div style={{background:T.bg,minHeight:"100vh",color:T.text,transition:"background 0.3s,color 0.3s"}}>

        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",marginRight:28,flexShrink:0}}>

          <div>
            <div style={{fontWeight:800,fontSize:14,letterSpacing:0.5}}>Blog Command Center</div>
            <div style={{fontSize:10,opacity:0.6}}>Young Douglas Insurance · California</div>
          </div>
        </div>
        <div style={{display:"flex",flex:1,overflowX:"auto"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{

              cursor:"pointer",borderBottom:tab===t.id?`3px solid ${B.red}`:"3px solid transparent",
              display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",flexShrink:0,
              transition:"all 0.15s",
            }}>
              {t.icon} {t.label}
              {t.badge>0&&<span style={{background:B.red,borderRadius:20,padding:"1px 6px",fontSize:10,fontWeight:700}}>{t.badge}</span>}

          ))}

        <div style={{display:"flex",alignItems:"center",gap:10,marginLeft:12,flexShrink:0}}>

            {isDark?"☀️ Light":"🌙 Dark"}

        </div>
      </div>

      <div style={{maxWidth:1200,margin:"0 auto",padding:"24px 20px"}}>
        {tab==="dashboard" && <Dashboard blogs={blogs} links={links} {...sharedProps}/>}
        {tab==="generator" && <Generator onSave={addBlog} {...sharedProps}/>}
        {tab==="library"   && <Library blogs={blogs} onDelete={deleteBlog} {...sharedProps}/>}
        {tab==="links"     && <LinkTracker blogs={blogs} links={links} onToggle={toggleLink} {...sharedProps}/>}
        {tab==="settings"  && <Settings onSaveTypes={saveTypes} onSaveAudiences={saveAudiences} {...sharedProps}/>}
      </div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────
function Dashboard({blogs,links,types,audiences,T,isDark}){
  const now=Date.now();
  const inRange=(b,a,z)=>{const age=now-new Date(b.date);return age>=a&&age<z;};

  const total=blogs.length;
  const thisWeek=blogs.filter(b=>inRange(b,0,ONE_WEEK));
  const lastWeek=blogs.filter(b=>inRange(b,ONE_WEEK,2*ONE_WEEK));
  const thisMonth=blogs.filter(b=>inRange(b,0,ONE_MONTH));
  const lastMonth=blogs.filter(b=>inRange(b,ONE_MONTH,2*ONE_MONTH));

  const compliant=b=>b.wordCount>=1300&&b.wordCount<=1400;
  const compRate=arr=>arr.length>0?Math.round(arr.filter(compliant).length/arr.length*100):0;

  const twComp=compRate(thisWeek);
  const lwComp=compRate(lastWeek);
  const linksDone=Object.values(links).filter(Boolean).length;
  const totalPairs=blogs.length*(blogs.length-1);
  const linkPct=totalPairs>0?Math.round((linksDone/totalPairs)*100):0;

  // 8-week sparkline
  const sparkData=Array.from({length:8},(_,i)=>
    blogs.filter(b=>{const age=now-new Date(b.date);return age>=(7-i)*ONE_WEEK&&age<(8-i)*ONE_WEEK;}).length
  );
  const compSpark=Array.from({length:8},(_,i)=>{
    const wk=blogs.filter(b=>{const age=now-new Date(b.date);return age>=(7-i)*ONE_WEEK&&age<(8-i)*ONE_WEEK;});
    return compRate(wk);
  });

  const typeCounts=types.reduce((a,t)=>{a[t.id]=blogs.filter(b=>b.typeId===t.id).length;return a;},{});
  const audCounts=audiences.reduce((a,au)=>{a[au.id]=blogs.filter(b=>b.audienceId===au.id).length;return a;},{});
  const maxTC=Math.max(...Object.values(typeCounts),1);

  const Card=({label,value,icon,color,prev,curr,sparkline,sparkColor,extra})=>(
    <div style={{background:T.card,borderRadius:14,padding:"20px 22px",border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",right:16,top:16,opacity:0.08,fontSize:52}}>{icon}</div>
      <div style={{fontSize:22,marginBottom:4}}>{icon}</div>
      <div style={{fontSize:34,fontWeight:900,color,lineHeight:1}}>{value}</div>
      <div style={{display:"flex",alignItems:"center",marginTop:4,flexWrap:"wrap",gap:4}}>
        <span style={{fontSize:12,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{label}</span>
        {prev!==undefined&&curr!==undefined&&<TrendBadge current={curr} previous={prev}/>}
      </div>
      {extra&&<div style={{fontSize:11,color:T.muted,marginTop:4}}>{extra}</div>}
      {sparkline&&<div style={{marginTop:10}}><MiniSparkline data={sparkline} color={sparkColor||color}/></div>}
    </div>
  );

  const topType=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0];
  const topAud=Object.entries(audCounts).sort((a,b)=>b[1]-a[1])[0];

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{fontWeight:800,fontSize:22,color:B.blue}}>📊 Dashboard</h2>
        <div style={{fontSize:12,color:T.muted}}>Last updated: {new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</div>
      </div>

      {/* KPI GRID */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
        <Card label="Total Blogs" value={total} icon="📝" color={B.blue}
          curr={thisMonth.length} prev={lastMonth.length} sparkline={sparkData} sparkColor={B.blue}
          extra={`${thisMonth.length} this month`}/>
        <Card label="This Week" value={thisWeek.length} icon="📅" color={B.green}
          curr={thisWeek.length} prev={lastWeek.length} sparkline={sparkData} sparkColor={B.green}
          extra={`${lastWeek.length} last week`}/>
        <Card label="Word Count ✓" value={`${compRate(blogs)}%`} icon="✅"
          color={compRate(blogs)>=80?B.green:B.amber}
          curr={twComp} prev={lwComp} sparkline={compSpark} sparkColor={B.green}
          extra={`${blogs.filter(compliant).length} of ${total} compliant`}/>
        <Card label="Links Confirmed" value={linksDone} icon="🔗" color={B.purple}
          extra={`${linkPct}% of ${totalPairs} pairs`}/>
      </div>

      {/* SECONDARY KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
        <div style={{background:T.card,borderRadius:14,padding:"16px 18px",border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
          <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>🏆 Top Blog Type</div>
          {topType?<>
            <div style={{fontWeight:800,fontSize:20,color:B.blue}}>{types.find(t=>t.id===topType[0])?.emoji} {topType[1]}</div>
            <div style={{fontSize:12,color:T.muted,marginTop:2}}>{types.find(t=>t.id===topType[0])?.label}</div>
          </>:<div style={{fontSize:12,color:T.muted}}>No blogs yet</div>}
        </div>
        <div style={{background:T.card,borderRadius:14,padding:"16px 18px",border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
          <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>👥 Top Audience</div>
          {topAud&&topAud[1]>0?<>
            <div style={{fontWeight:800,fontSize:20,color:B.red}}>{audiences.find(a=>a.id===topAud[0])?.emoji} {topAud[1]}</div>
            <div style={{fontSize:12,color:T.muted,marginTop:2}}>{audiences.find(a=>a.id===topAud[0])?.label}</div>
          </>:<div style={{fontSize:12,color:T.muted}}>No blogs yet</div>}
        </div>
        <div style={{background:T.card,borderRadius:14,padding:"16px 18px",border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
          <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>📐 Avg Word Count</div>
          <div style={{fontWeight:800,fontSize:20,color:B.blue}}>
            {blogs.length>0?Math.round(blogs.reduce((a,b)=>a+b.wordCount,0)/blogs.length):0}
          </div>
          <div style={{fontSize:12,color:T.muted,marginTop:2}}>Target: 1,300–1,400</div>
        </div>
        <div style={{background:T.card,borderRadius:14,padding:"16px 18px",border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
          <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>🗂️ Type Coverage</div>
          <div style={{fontWeight:800,fontSize:20,color:B.purple}}>
            {types.filter(t=>typeCounts[t.id]>0).length}<span style={{fontSize:14,fontWeight:400,color:T.muted}}>/{types.length}</span>
          </div>
          <div style={{fontSize:12,color:T.muted,marginTop:2}}>Types with blogs</div>
        </div>
      </div>

      {/* BOTTOM ROW */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
        {/* Type bars */}
        <div style={{background:T.card,borderRadius:14,padding:20,border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
          <div style={{fontWeight:700,fontSize:13,color:B.blue,marginBottom:14}}>📂 Blog Type Coverage</div>
          <div style={{maxHeight:260,overflowY:"auto"}}>
            {types.map(t=>(
              <div key={t.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                  <span style={{color:T.text}}>{t.emoji} {t.label}</span>
                  <span style={{fontWeight:700,color:typeCounts[t.id]>0?B.green:T.muted}}>{typeCounts[t.id]}</span>
                </div>
                <div style={{background:T.row,borderRadius:4,height:6}}>
                  <div style={{background:typeCounts[t.id]>0?t.color:T.row,width:`${Math.min((typeCounts[t.id]/maxTC)*100,100)}%`,height:"100%",borderRadius:4,transition:"width 0.4s"}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Recent + Audience */}
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{background:T.card,borderRadius:14,padding:20,border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
            <div style={{fontWeight:700,fontSize:13,color:B.blue,marginBottom:12}}>👥 Audience Coverage</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {audiences.map(a=>(
                <div key={a.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 9px",background:audCounts[a.id]>0?isDark?"#1e3a5f":"#EFF6FF":T.row,borderRadius:7,border:`1px solid ${audCounts[a.id]>0?B.blue+"33":T.border}`}}>
                  <span style={{fontSize:11,color:T.text}}>{a.emoji} {a.label}</span>
                  <span style={{fontSize:12,fontWeight:700,color:audCounts[a.id]>0?B.blue:T.muted}}>{audCounts[a.id]}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{background:T.card,borderRadius:14,padding:20,border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:B.blue,marginBottom:12}}>🕐 Recent Activity</div>
            {blogs.length===0&&<div style={{color:T.muted,fontSize:13}}>No blogs yet.</div>}
            {blogs.slice(0,5).map(b=>{
              const ok=b.wordCount>=1300&&b.wordCount<=1400;
              return(
                <div key={b.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"7px 9px",background:T.row,borderRadius:8}}>
                  <span style={{fontSize:16}}>{b.typeEmoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:T.text}}>{b.title}</div>
                    <div style={{fontSize:10,color:T.muted}}>{fmt(b.date)} · {b.audienceEmoji}</div>
                  </div>
                  <span style={{fontSize:9,padding:"2px 6px",borderRadius:20,background:ok?isDark?"#0d2a1a":"#dcfce7":isDark?"#2a0d0d":"#fee2e2",color:ok?B.green:B.red,fontWeight:700,whiteSpace:"nowrap"}}>{ok?"✓":"⚠"} {b.wordCount}w</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{background:isDark?"#2a2010":"#FFF8E1",border:`1px solid ${isDark?"#665520":"#FFD54F"}`,borderRadius:10,padding:"11px 16px",fontSize:12,color:isDark?"#e8cc80":"#5D4037"}}>
        <strong>⚠️ MANDATORY QA:</strong> Fact-check all news sources before publishing at <a href="https://toolbox.google.com/factcheck/explorer/search/list:recent;hl=en" target="_blank" style={{color:B.blue}}>Google Fact Check Explorer</a>. Flag any claim rated false or misleading.
      </div>
    </div>
  );
}

// ── GENERATOR ──────────────────────────────────────────────
function Generator({types,audiences,onSave,T,isDark}){
  const[typeId,setTypeId]=useState(types[0]?.id||"medicare");
  const[audId,setAudId]=useState(audiences[0]?.id||"newlyweds");
  const[topic,setTopic]=useState("");
  const[blog,setBlog]=useState("");
  const[generating,setGenerating]=useState(false);
  const[error,setError]=useState("");
  const[saved,setSaved]=useState(false);
  const[copied,setCopied]=useState(false);

  const st=types.find(t=>t.id===typeId)||types[0];
  const sa=audiences.find(a=>a.id===audId)||audiences[0];
  const words=blog?wc(blog):0;
  const wcOk=words>=1300&&words<=1400;

  const generate=async()=>{
    if(!topic.trim()){setError("Enter a topic or select a suggestion.");return;}
    setError("");setBlog("");setSaved(false);setGenerating(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,
          system:buildSystemPrompt(st,sa.label),
          messages:[{role:"user",content:`Write a complete YDI blog post on: "${topic}"\nType: ${st.label}\nAudience: ${sa.label}\nFollow all protocols. Write 1300-1400 words. Do not truncate.`}]
        }),
      });
      const d=await res.json();
      setBlog(d.content?.[0]?.text||"");
    }catch{setError("Generation failed. Try again.");}
    setGenerating(false);
  };

  const handleSave=()=>{
    if(!blog)return;
    const tm=blog.match(/(?:^|\n)#+\s*(.+)/);
    const title=tm?tm[1].trim():topic;
    onSave({id:uid(),typeId,typeLabel:st.label,typeEmoji:st.emoji,audienceId:audId,audienceLabel:sa.label,audienceEmoji:sa.emoji,title,topic,content:blog,wordCount:words,date:new Date().toISOString()});
    setSaved(true);
  };

  const sugg=GSC[typeId]||[];

  return(
    <div style={{display:"grid",gridTemplateColumns:"250px 1fr",gap:18}}>
      <div>
        <div style={{background:T.card,borderRadius:12,padding:16,marginBottom:12,border:`1px solid ${T.border}`}}>
          <div style={{fontWeight:700,fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Blog Type</div>
          <div style={{maxHeight:300,overflowY:"auto",display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {types.map(t=>(
              <button key={t.id} onClick={()=>{setTypeId(t.id);setTopic("");}} style={{background:typeId===t.id?t.color:T.row,color:typeId===t.id?B.white:T.text,border:`2px solid ${typeId===t.id?t.color:T.border}`,borderRadius:8,padding:"7px 4px",fontSize:10,cursor:"pointer",fontWeight:typeId===t.id?700:400,textAlign:"center",transition:"all 0.15s"}}>
                <div style={{fontSize:14,marginBottom:2}}>{t.emoji}</div>{t.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{background:T.card,borderRadius:12,padding:16,marginBottom:12,border:`1px solid ${T.border}`}}>
          <div style={{fontWeight:700,fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Target Audience</div>
          {audiences.map(a=>(
            <button key={a.id} onClick={()=>setAudId(a.id)} style={{display:"block",width:"100%",textAlign:"left",background:audId===a.id?B.blue:"transparent",color:audId===a.id?B.white:T.text,border:`2px solid ${audId===a.id?B.blue:T.border}`,borderRadius:8,padding:"7px 11px",fontSize:12,cursor:"pointer",fontWeight:audId===a.id?700:400,marginBottom:5,transition:"all 0.15s"}}>
              {a.emoji} {a.label}
            </button>
          ))}
        </div>
        <div style={{background:isDark?"#2a2010":"#FFF8E1",borderRadius:12,padding:13,border:`1px solid ${isDark?"#665520":"#FFD54F"}`,fontSize:11,lineHeight:1.7,color:isDark?"#e8cc80":"#5D4037"}}>
          <strong>✅ Protocol Active</strong><br/>
          1,300-1,400w · No "insurance" in title · Insurance → final ¶ · Fact-check · CTA → quote form
        </div>
      </div>
      <div>
        {!blog&&(
          <div style={{background:T.card,borderRadius:12,padding:22,border:`1px solid ${T.border}`}}>
            <div style={{fontWeight:700,fontSize:14,color:B.blue,marginBottom:16}}>{st.emoji} {st.label} · {sa.emoji} {sa.label}</div>
            <div style={{fontWeight:700,fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:9}}>📊 GSC-Powered Suggestions</div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:18}}>
              {sugg.map((s,i)=>(
                <button key={i} onClick={()=>setTopic(s)} style={{background:topic===s?isDark?"#1e3a5f":"#EFF6FF":T.row,border:`2px solid ${topic===s?B.blue:T.border}`,borderRadius:8,padding:"9px 13px",textAlign:"left",cursor:"pointer",fontSize:13,color:topic===s?B.blue:T.text,fontWeight:topic===s?600:400,transition:"all 0.15s"}}>
                  {topic===s&&"✓ "}{s}
                </button>
              ))}
            </div>
            <div style={{fontWeight:700,fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Or Custom Topic</div>
            <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Enter your blog topic..."
              style={{width:"100%",padding:"11px 13px",borderRadius:8,border:`2px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box",color:T.text,background:T.input,marginBottom:14}}/>
            {error&&<div style={{background:isDark?"#2a0d0d":"#FEE2E2",border:"1px solid #FECACA",borderRadius:8,padding:"9px 13px",fontSize:12,color:"#DC2626",marginBottom:12}}>⚠️ {error}</div>}
            <button onClick={generate} disabled={generating} style={{width:"100%",background:generating?"#94a3b8":B.blue,color:B.white,border:"none",borderRadius:10,padding:"14px",fontSize:15,fontWeight:700,cursor:generating?"not-allowed":"pointer"}}>
              {generating?"✍️ Generating...":` 🚀 Generate ${st.label} Blog`}
            </button>
          </div>
        )}
        {blog&&(
          <div>
            <div style={{display:"flex",gap:9,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <button onClick={()=>{navigator.clipboard.writeText(blog);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{background:copied?B.green:B.blue,color:B.white,border:"none",borderRadius:8,padding:"9px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{copied?"✅ Copied!":"📋 Copy Blog"}</button>
              <button onClick={handleSave} disabled={saved} style={{background:saved?B.green:"transparent",color:saved?B.white:B.blue,border:`2px solid ${saved?B.green:B.blue}`,borderRadius:8,padding:"9px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{saved?"✅ Saved!":"💾 Save to Library"}</button>
              <button onClick={()=>{setBlog("");setTopic("");setSaved(false);}} style={{background:"transparent",color:T.muted,border:`2px solid ${T.border}`,borderRadius:8,padding:"9px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>← New Blog</button>
              <div style={{marginLeft:"auto",fontSize:12,fontWeight:700,color:wcOk?B.green:B.red}}>{words}w {wcOk?"✅":words<1300?"⚠️ Short":"⚠️ Long"}</div>
            </div>
            <div style={{background:isDark?"#162035":"#EFF6FF",border:`1px solid ${B.blue}33`,borderRadius:9,padding:"9px 14px",marginBottom:12,fontSize:11,color:B.blue}}>
              <strong>⚠️ MANDATORY QA:</strong> Fact-check all sources at <a href="https://toolbox.google.com/factcheck/explorer/search/list:recent;hl=en" target="_blank" style={{color:B.blue}}>Google Fact Check Explorer</a>.
            </div>
            <div style={{background:T.card,borderRadius:12,padding:24,border:`1px solid ${T.border}`,fontSize:14,lineHeight:1.85,color:T.text,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:"65vh",overflowY:"auto",fontFamily:"Georgia,serif"}}>
              {blog}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── LIBRARY ────────────────────────────────────────────────
function Library({blogs,types,audiences,onDelete,T,isDark}){
  const[ft,setFt]=useState("all");
  const[fa,setFa]=useState("all");
  const[sel,setSel]=useState(null);
  const[copied,setCopied]=useState(false);
  const[del,setDel]=useState(null);

  const filtered=blogs.filter(b=>ft==="all"||b.typeId===ft).filter(b=>fa==="all"||b.audienceId===fa);

  if(sel){
    const b=blogs.find(x=>x.id===sel);
    if(!b){setSel(null);return null;}
    const ok=b.wordCount>=1300&&b.wordCount<=1400;
    return(
      <div>
        <div style={{display:"flex",gap:9,marginBottom:14,alignItems:"center"}}>
          <button onClick={()=>setSel(null)} style={{background:"transparent",color:B.blue,border:`2px solid ${B.blue}`,borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>← Library</button>
          <button onClick={()=>{navigator.clipboard.writeText(b.content);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{background:copied?B.green:B.blue,color:B.white,border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{copied?"✅ Copied!":"📋 Copy"}</button>
          <div style={{marginLeft:"auto",fontSize:12,fontWeight:700,color:ok?B.green:B.red}}>{b.wordCount}w {ok?"✅":"⚠️"}</div>
        </div>
        <div style={{background:isDark?"#162035":"#EFF6FF",border:`1px solid ${B.blue}33`,borderRadius:9,padding:"9px 14px",marginBottom:12,fontSize:11,color:B.blue}}>
          <strong>⚠️ MANDATORY QA:</strong> Fact-check all sources at <a href="https://toolbox.google.com/factcheck/explorer/search/list:recent;hl=en" target="_blank" style={{color:B.blue}}>Google Fact Check Explorer</a>.
        </div>
        <div style={{background:T.card,borderRadius:12,padding:24,border:`1px solid ${T.border}`,fontSize:14,lineHeight:1.85,color:T.text,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:"70vh",overflowY:"auto",fontFamily:"Georgia,serif"}}>{b.content}</div>
      </div>
    );
  }

  return(
    <div>
      <div style={{display:"flex",gap:10,marginBottom:18,alignItems:"center",flexWrap:"wrap"}}>
        <h2 style={{fontWeight:800,fontSize:22,color:B.blue,margin:0}}>📚 Blog Library</h2>
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <select value={ft} onChange={e=>setFt(e.target.value)} style={{padding:"7px 11px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:12,background:T.card,color:T.text}}>
            <option value="all">All Types</option>
            {types.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
          </select>
          <select value={fa} onChange={e=>setFa(e.target.value)} style={{padding:"7px 11px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:12,background:T.card,color:T.text}}>
            <option value="all">All Audiences</option>
            {audiences.map(a=><option key={a.id} value={a.id}>{a.emoji} {a.label}</option>)}
          </select>
        </div>
      </div>
      {filtered.length===0&&<div style={{background:T.card,borderRadius:12,padding:48,textAlign:"center",border:`1px solid ${T.border}`,color:T.muted,fontSize:15}}>📝 No blogs yet. Use the Generator tab.</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {filtered.map(b=>{
          const ok=b.wordCount>=1300&&b.wordCount<=1400;
          return(
            <div key={b.id} style={{background:T.card,borderRadius:12,padding:16,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
              <div style={{display:"flex",gap:9,marginBottom:9}}>
                <span style={{fontSize:22}}>{b.typeEmoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:12,lineHeight:1.4,color:T.text}}>{b.title}</div>
                  <div style={{fontSize:10,color:T.muted,marginTop:2}}>{fmt(b.date)} · {b.audienceEmoji} {b.audienceLabel} · {b.typeLabel}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:7,alignItems:"center"}}>
                <span style={{fontSize:10,padding:"3px 9px",borderRadius:20,background:ok?isDark?"#0d2a1a":"#dcfce7":isDark?"#2a0d0d":"#fee2e2",color:ok?B.green:B.red,fontWeight:700}}>{ok?"✅":"⚠️"} {b.wordCount}w</span>
                <button onClick={()=>setSel(b.id)} style={{background:B.blue,color:B.white,border:"none",borderRadius:7,padding:"5px 13px",fontSize:11,fontWeight:700,cursor:"pointer"}}>View</button>
                {del===b.id?<>
                  <button onClick={()=>{onDelete(b.id);setDel(null);}} style={{background:B.red,color:B.white,border:"none",borderRadius:7,padding:"5px 11px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Confirm</button>
                  <button onClick={()=>setDel(null)} style={{background:"transparent",color:T.muted,border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 11px",fontSize:11,cursor:"pointer"}}>Cancel</button>
                </>:
                  <button onClick={()=>setDel(b.id)} style={{background:"transparent",color:T.muted,border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 9px",fontSize:11,cursor:"pointer",marginLeft:"auto"}}>🗑️</button>
                }
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── LINK TRACKER ───────────────────────────────────────────
function LinkTracker({blogs,types,links,onToggle,T,isDark}){
  const[ft,setFt]=useState("all");
  const filtered=blogs.filter(b=>ft==="all"||b.typeId===ft);
  const total=filtered.length*(filtered.length-1);
  const done=filtered.flatMap(a=>filtered.filter(b=>b.id!==a.id).map(b=>links[`${a.id}__${b.id}`])).filter(Boolean).length;
  const pct=total>0?Math.round((done/total)*100):0;
  return(
    <div>
      <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:18,flexWrap:"wrap"}}>
        <h2 style={{fontWeight:800,fontSize:22,color:B.blue,margin:0}}>🔗 Internal Link Tracker</h2>
        <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
          <div style={{fontSize:13,fontWeight:700,color:pct===100?B.green:pct>=50?B.amber:B.red}}>{done}/{total} links · {pct}%</div>
          <select value={ft} onChange={e=>setFt(e.target.value)} style={{padding:"7px 11px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:12,background:T.card,color:T.text}}>
            <option value="all">All Types</option>
            {types.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
          </select>
        </div>
      </div>
      {blogs.length===0&&<div style={{background:T.card,borderRadius:12,padding:48,textAlign:"center",border:`1px solid ${T.border}`,color:T.muted,fontSize:15}}>Generate some blogs first, then track their internal links here.</div>}
      {filtered.length>0&&(
        <div style={{background:T.card,borderRadius:12,padding:18,border:`1px solid ${T.border}`,overflowX:"auto"}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:12}}>Rows = source blog · Columns = linked blog · Click to toggle ✅</div>
          <table style={{borderCollapse:"collapse",width:"100%",fontSize:10}}>
            <thead>
              <tr>
                <th style={{padding:"7px 9px",textAlign:"left",background:T.row2,minWidth:140,position:"sticky",left:0,zIndex:1,color:T.text}}>Source →</th>
                {filtered.map(b=>(
                  <th key={b.id} style={{padding:"5px 6px",background:T.row2,maxWidth:70,fontWeight:600,color:T.muted,textAlign:"center"}}>
                    <div title={b.title}>{b.typeEmoji}</div>
                    <div style={{fontSize:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:60,color:T.muted}}>{b.title.slice(0,16)}…</div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(from=>(
                <tr key={from.id}>
                  <td style={{padding:"7px 9px",background:T.row,position:"sticky",left:0,zIndex:1,borderBottom:`1px solid ${T.border}`,color:T.text}}>
                    <div style={{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:130}} title={from.title}>{from.typeEmoji} {from.title.slice(0,18)}…</div>
                  </td>
                  {filtered.map(to=>{
                    const same=from.id===to.id;
                    const key=`${from.id}__${to.id}`;
                    const done=links[key];
                    return(
                      <td key={to.id} style={{textAlign:"center",padding:"3px",borderBottom:`1px solid ${T.border}`}}>
                        {same?<div style={{background:T.row2,width:26,height:26,borderRadius:5,margin:"0 auto"}}/>:
                          <button onClick={()=>onToggle(from.id,to.id)} title={`${from.title} → ${to.title}`} style={{width:26,height:26,borderRadius:5,border:`2px solid ${done?B.green:T.border}`,background:done?isDark?"#0d2a1a":"#dcfce7":T.row,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",transition:"all 0.15s"}}>
                            {done?"✅":"□"}
                          </button>
                        }
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── SETTINGS ───────────────────────────────────────────────
function Settings({types,audiences,onSaveTypes,onSaveAudiences,T,isDark}){
  const[tab,setTab]=useState("types");
  const[nt,setNt]=useState({label:"",emoji:"📝",color:B.blue,protocol:"standard"});
  const[na,setNa]=useState({label:"",emoji:"👤"});
  const[saved,setSaved]=useState("");
  const PROTOS=["standard","home","commercial","life","barber","restaurant"];

  const addType=()=>{
    if(!nt.label.trim())return;
    onSaveTypes([...types,{...nt,id:nt.label.toLowerCase().replace(/\s+/g,"_")+"_"+uid()}]);
    setNt({label:"",emoji:"📝",color:B.blue,protocol:"standard"});
    setSaved("type");setTimeout(()=>setSaved(""),2000);
  };
  const addAud=()=>{
    if(!na.label.trim())return;
    onSaveAudiences([...audiences,{...na,id:na.label.toLowerCase().replace(/\s+/g,"_")+"_"+uid()}]);
    setNa({label:"",emoji:"👤"});
    setSaved("aud");setTimeout(()=>setSaved(""),2000);
  };
  const isDefaultType=id=>DEFAULT_TYPES.some(t=>t.id===id);
  const isDefaultAud=id=>DEFAULT_AUDIENCES.some(a=>a.id===id);

  return(
    <div>
      <h2 style={{fontWeight:800,fontSize:22,color:B.blue,marginBottom:18}}>⚙️ Settings</h2>
      <div style={{display:"flex",gap:9,marginBottom:18}}>
        {["types","audiences"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{background:tab===t?B.blue:"transparent",color:tab===t?B.white:B.blue,border:`2px solid ${B.blue}`,borderRadius:8,padding:"8px 18px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            {t==="types"?"📂 Blog Types":"👥 Audiences"}
          </button>
        ))}
      </div>
      {tab==="types"&&(
        <div style={{background:T.card,borderRadius:12,padding:22,border:`1px solid ${T.border}`}}>
          <div style={{fontWeight:700,fontSize:13,color:B.blue,marginBottom:14}}>Add New Blog Type</div>
          <div style={{display:"flex",gap:9,marginBottom:18,flexWrap:"wrap"}}>
            <input value={nt.label} onChange={e=>setNt(p=>({...p,label:e.target.value}))} placeholder="Type name (e.g. HVAC)"
              style={{flex:1,minWidth:140,padding:"9px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,background:T.input,color:T.text,outline:"none"}}/>
            <input value={nt.emoji} onChange={e=>setNt(p=>({...p,emoji:e.target.value}))} placeholder="Emoji"
              style={{width:60,padding:"9px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:18,textAlign:"center",background:T.input,color:T.text}}/>
            <input type="color" value={nt.color} onChange={e=>setNt(p=>({...p,color:e.target.value}))}
              style={{width:46,height:40,padding:2,borderRadius:8,border:`1px solid ${T.border}`,cursor:"pointer"}}/>
            <select value={nt.protocol} onChange={e=>setNt(p=>({...p,protocol:e.target.value}))}
              style={{padding:"9px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,background:T.card,color:T.text}}>
              {PROTOS.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <button onClick={addType} style={{background:B.blue,color:B.white,border:"none",borderRadius:8,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              {saved==="type"?"✅ Added!":"+ Add Type"}
            </button>
          </div>
          <div style={{fontWeight:700,fontSize:12,color:T.muted,marginBottom:11}}>All Types ({types.length})</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
            {types.map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",background:T.row,borderRadius:10,border:`1px solid ${T.border}`}}>
                <span style={{fontSize:18}}>{t.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:12,color:T.text}}>{t.label}</div>
                  <div style={{fontSize:10,color:T.muted}}>{t.protocol}</div>
                </div>
                <div style={{width:10,height:10,borderRadius:"50%",background:t.color,flexShrink:0}}/>
                {!isDefaultType(t.id)?
                  <button onClick={()=>onSaveTypes(types.filter(x=>x.id!==t.id))} style={{background:"transparent",color:B.red,border:"none",cursor:"pointer",fontSize:14,padding:0}}>✕</button>:
                  <span style={{fontSize:9,color:T.muted}}>core</span>
                }
              </div>
            ))}
          </div>
        </div>
      )}
      {tab==="audiences"&&(
        <div style={{background:T.card,borderRadius:12,padding:22,border:`1px solid ${T.border}`}}>
          <div style={{fontWeight:700,fontSize:13,color:B.blue,marginBottom:14}}>Add New Audience</div>
          <div style={{display:"flex",gap:9,marginBottom:18}}>
            <input value={na.label} onChange={e=>setNa(p=>({...p,label:e.target.value}))} placeholder="Audience name (e.g. Veterans)"
              style={{flex:1,padding:"9px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,background:T.input,color:T.text,outline:"none"}}/>
            <input value={na.emoji} onChange={e=>setNa(p=>({...p,emoji:e.target.value}))} placeholder="Emoji"
              style={{width:60,padding:"9px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:18,textAlign:"center",background:T.input,color:T.text}}/>
            <button onClick={addAud} style={{background:B.blue,color:B.white,border:"none",borderRadius:8,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              {saved==="aud"?"✅ Added!":"+ Add Audience"}
            </button>
          </div>
          <div style={{fontWeight:700,fontSize:12,color:T.muted,marginBottom:11}}>All Audiences ({audiences.length})</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
            {audiences.map(a=>(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",background:T.row,borderRadius:10,border:`1px solid ${T.border}`}}>
                <span style={{fontSize:20}}>{a.emoji}</span>
                <div style={{flex:1,fontWeight:600,fontSize:12,color:T.text}}>{a.label}</div>
                {!isDefaultAud(a.id)?
                  <button onClick={()=>onSaveAudiences(audiences.filter(x=>x.id!==a.id))} style={{background:"transparent",color:B.red,border:"none",cursor:"pointer",fontSize:14,padding:0}}>✕</button>:
                  <span style={{fontSize:9,color:T.muted}}>core</span>
                }
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
