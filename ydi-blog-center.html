// ─── PROTOCOL BUILDER ─────────────────────────────────────────────────────────
const buildProtocol = (type) => {
  const p = type.protocol || "standard";
  const base = `- 1,300–1,400 words total\n- Never use "insurance" in the blog title\n- Insurance content ONLY in the final paragraph\n- 4 Unsplash image suggestions placed naturally throughout body\n- 2–3 italicized quotes with interpretive commentary\n- 2–3 credible news sources (Reuters, AP, NPR, USA Today, ABC News, CBS News, The Guardian)\n- Internal link to anchor ${type.label} blog in first body paragraph\n- CTA in final paragraph: fill out a quote form at https://youngdouglasinsurance.com/pages/get-a-free-insurance-quote-california\n- Article schema JSON-LD + FAQ schema at end`;
  if (p === "home")       return `HOME BLOG PROTOCOL:\n${base}\n- Insurance content in section 9 only\n- 1 Young Douglas internal link`;
  if (p === "commercial") return `COMMERCIAL BLOG PROTOCOL:\n${base}\n- 9-section structure with H2 headings\n- 2–3 business owner quotes (italicized)\n- 6 social snippets at end (2 each: Instagram, Twitter/X, Google Business)`;
  if (p === "life")       return `LIFE BLOG PROTOCOL:\n${base}\n- BANNED: "death benefit", "when you die", "if you pass away" — rephrase naturally`;
  if (p === "barber")     return `BARBER/BEAUTY PROTOCOL:\n- 1,300–1,400 words\n- 1 Unsplash image at top\n- 2–3 salon/barber owner quotes\n- Insurance ONLY in final paragraph\n- Never use "insurance" in title\n- CTA: fill out a quote form at https://youngdouglasinsurance.com/pages/get-a-free-insurance-quote-california`;
  if (p === "restaurant") return `RESTAURANT BLOG PROTOCOL:\n${base}\n- 2–3 restaurant owner quotes`;
  return `${type.label.toUpperCase()} BLOG PROTOCOL:\n${base}`;
};

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const load = async (key, fallback) => {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : fallback; }
  catch { return fallback; }
};
const save = async (key, val) => {
  try { await window.storage.set(key, JSON.stringify(val)); } catch {}
};

// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function Dashboard({ blogs, types, audiences, links, T, isDark }) {
  const total = blogs.length;
  const thisWeek = blogs.filter(b => (Date.now() - new Date(b.date)) < 7*24*60*60*1000).length;
  const compliant = blogs.filter(b => b.wordCount >= 1300 && b.wordCount <= 1400).length;
  const complianceRate = total > 0 ? Math.round((compliant/total)*100) : 0;
  const linksDone = Object.values(links).filter(Boolean).length;
  const typeCounts = types.reduce((acc,t) => { acc[t.id] = blogs.filter(b => b.typeId === t.id).length; return acc; }, {});
  const audCounts  = audiences.reduce((acc,a) => { acc[a.id] = blogs.filter(b => b.audienceId === a.id).length; return acc; }, {});
  const maxTypeCount = Math.max(...Object.values(typeCounts), 1);

  const kpis = [
    { label:"Total Blogs",       value:total,          icon:"📝", color:B.blue  },
    { label:"This Week",         value:thisWeek,       icon:"📅", color:B.green },
    { label:"Word Count ✓",      value:`${complianceRate}%`, icon:"✅", color:complianceRate>=80?B.green:B.amber },
    { label:"Links Confirmed",   value:linksDone,      icon:"🔗", color:B.purple},
  ];

  return (
    <div>
      <h2 style={{margin:"0 0 20px",fontWeight:700,fontSize:22,color:B.blue}}>📊 Dashboard</h2>

      {/* KPI Row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}}>
        {kpis.map(k => (
          <div key={k.label} style={{background:T.kpiBg,borderRadius:12,padding:"20px 22px",border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
            <div style={{fontSize:26,marginBottom:8}}>{k.icon}</div>
            <div style={{fontSize:32,fontWeight:900,color:k.color,lineHeight:1}}>{k.value}</div>
            <div style={{fontSize:12,color:T.muted,marginTop:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* Two columns */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        {/* Blog Type Coverage */}
        <div style={{background:T.card,borderRadius:12,padding:22,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16,color:B.blue}}>📂 Blog Type Coverage</div>
          {types.map(t => (
            <div key={t.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                <span>{t.emoji} {t.label}</span>
                <span style={{fontWeight:700,color:typeCounts[t.id]>0?B.green:T.muted}}>{typeCounts[t.id]} blogs</span>
              </div>
              <div style={{background:"#E8EDF5",borderRadius:4,height:6}}>
                <div style={{background:typeCounts[t.id]>0?t.color:"#E8EDF5",width:`${Math.min((typeCounts[t.id]/maxTypeCount)*100,100)}%`,height:"100%",borderRadius:4,transition:"width 0.3s"}} />
              </div>
            </div>
          ))}
        </div>

        {/* Audience Coverage + Recent */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{background:T.card,borderRadius:12,padding:22,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14,color:B.blue}}>👥 Audience Coverage</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {audiences.map(a => (
                <div key={a.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px",background:audCounts[a.id]>0?"#EFF6FF":T.suggBg,borderRadius:8,border:`1px solid ${audCounts[a.id]>0?B.blue+"33":T.border}`}}>
                  <span style={{fontSize:12}}>{a.emoji} {a.label}</span>
                  <span style={{fontSize:13,fontWeight:700,color:audCounts[a.id]>0?B.blue:T.muted}}>{audCounts[a.id]}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Recent blogs */}
          <div style={{background:T.card,borderRadius:12,padding:22,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)",flex:1}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14,color:B.blue}}>🕐 Recent Blogs</div>
            {blogs.length === 0 && <div style={{color:T.muted,fontSize:13}}>No blogs generated yet.</div>}
            {blogs.slice(0,5).map(b => (
              <div key={b.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"8px 10px",background:T.suggBg,borderRadius:8}}>
                <span style={{fontSize:18}}>{b.typeEmoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.title}</div>
                  <div style={{fontSize:11,color:T.muted}}>{fmt(b.date)} · {b.wordCount}w · {b.audienceEmoji} {b.audienceLabel}</div>
                </div>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:b.wordCount>=1300&&b.wordCount<=1400?"#dcfce7":"#fee2e2",color:b.wordCount>=1300&&b.wordCount<=1400?B.green:B.red,fontWeight:700,whiteSpace:"nowrap"}}>
                  {b.wordCount>=1300&&b.wordCount<=1400?"✓":"⚠️"} {b.wordCount}w
                </span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* QA reminder */}
      <div style={{background:isDark?"#2a2010":"#FFF8E1",border:isDark?"1px solid #665520":"1px solid #FFD54F",borderRadius:10,padding:"12px 18px",fontSize:13,color:isDark?"#e8cc80":"#5D4037"}}>
        <strong>⚠️ MANDATORY QA:</strong> Fact-check all news sources before publishing at{" "}
        <a href="https://toolbox.google.com/factcheck/explorer/search/list:recent;hl=en" target="_blank" rel="noreferrer" style={{color:B.blue}}>Google Fact Check Explorer</a>
        . Flag any claim rated false or misleading. This step is non-negotiable.
      </div>
    </div>
  );
}

// GENERATOR
// ═══════════════════════════════════════════════════════════════════════════════
function Generator({ types, audiences, onSave, T, isDark }) {
  const [typeId, setTypeId]       = useState(types[0]?.id || "medicare");
  const [audienceId, setAudienceId] = useState(audiences[0]?.id || "newlyweds");
  const [topic, setTopic]         = useState("");
  const [blog, setBlog]           = useState("");
  const [generating, setGenerating] = useState(false);
  const [error, setError]         = useState("");
  const [saved, setSaved]         = useState(false);
  const [copied, setCopied]       = useState(false);

  const selectedType     = types.find(t => t.id === typeId) || types[0];
  const selectedAudience = audiences.find(a => a.id === audienceId) || audiences[0];
  const suggestions      = GSC[typeId] || [];
  const words            = blog ? wc(blog) : 0;
  const wcOk             = words >= 1300 && words <= 1400;

  const generate = async () => {
    if (!topic.trim()) { setError("Enter a topic or select a suggestion."); return; }
    setError(""); setBlog(""); setSaved(false); setGenerating(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:4000,
          system: buildSystemPrompt(selectedType, selectedAudience.label),
          messages:[{role:"user",content:`Write a complete YDI blog post on this topic: "${topic}"\n\nType: ${selectedType.label}\nAudience: ${selectedAudience.label}\n\nFollow all protocols. Write 1,300–1,400 words. Include all required elements. Do not truncate.`}],
        }),
      });
      const d = await res.json();
      const text = d.content?.[0]?.text || "";
      setBlog(text);
    } catch { setError("Generation failed. Try again."); }
    setGenerating(false);
  };

  const handleSave = async () => {
    if (!blog) return;
    const titleMatch = blog.match(/(?:^|\n)#+\s*(.+)/);
    const title = titleMatch ? titleMatch[1].trim() : topic;
    await onSave({
      id: uid(), typeId, typeLabel: selectedType.label, typeEmoji: selectedType.emoji,
      audienceId, audienceLabel: selectedAudience.label, audienceEmoji: selectedAudience.emoji,
      title, topic, content: blog, wordCount: words, date: new Date().toISOString(),
      linked: false,
    });
    setSaved(true);
  };

  return (
    <div style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:20}}>
      {/* LEFT */}
      <div>
        {/* Type picker */}
        <div style={{background:T.card,borderRadius:12,padding:18,marginBottom:14,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{fontWeight:700,fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Blog Type</div>
          <div style={{maxHeight:280,overflowY:"auto",display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {types.map(t => (
              <button key={t.id} onClick={() => {setTypeId(t.id); setTopic("");}} style={{
                background: typeId===t.id ? t.color : T.rowBg2,
                color: typeId===t.id ? B.white : T.text,
                border: `2px solid ${typeId===t.id ? t.color : T.border}`,
                borderRadius:8, padding:"7px 4px", fontSize:10,
                cursor:"pointer", fontWeight:typeId===t.id?700:400,
                textAlign:"center", transition:"all 0.15s",
              }}>
                <div style={{fontSize:14,marginBottom:2}}>{t.emoji}</div>{t.label}
              </button>
            ))}
          </div>
        </div>

        {/* Audience picker */}
        <div style={{background:T.card,borderRadius:12,padding:18,marginBottom:14,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{fontWeight:700,fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Target Audience</div>
          {audiences.map(a => (
            <button key={a.id} onClick={() => setAudienceId(a.id)} style={{
              display:"block",width:"100%",textAlign:"left",
              background:audienceId===a.id ? B.blue : "transparent",
              color:audienceId===a.id ? B.white : T.text,
              border:`2px solid ${audienceId===a.id ? B.blue : T.border}`,
              borderRadius:8, padding:"8px 12px", fontSize:12,
              cursor:"pointer", fontWeight:audienceId===a.id?700:400,
              marginBottom:6, transition:"all 0.15s",
            }}>
              {a.emoji} {a.label}
            </button>
          ))}
        </div>

        {/* Protocol card */}
        <div style={{background:"#FFF8E1",borderRadius:12,padding:14,border:"1px solid #FFD54F",fontSize:11,lineHeight:1.7,color:isDark?"#e8cc80":"#5D4037"}}>
          <div style={{fontWeight:700,marginBottom:4}}>✅ Active Protocol</div>

        </div>
      </div>

      {/* RIGHT */}
      <div>
        {!blog && (
          <div style={{background:T.card,borderRadius:12,padding:24,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>

                  border:`2px solid ${topic===s?B.blue:T.border}`,

                  color:topic===s?B.blue:T.text, fontWeight:topic===s?600:400,
                  transition:"all 0.15s",
                }}>

            <div style={{fontWeight:700,fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Or Custom Topic</div>
            <input
              value={topic} onChange={e => setTopic(e.target.value)}

              style={{width:"100%",padding:"12px 14px",borderRadius:8,border:`2px solid ${T.border}`,fontSize:14,fontFamily:"'Georgia',serif",outline:"none",boxSizing:"border-box",color:T.text,background:T.inputBg,marginBottom:16}}
              onFocus={e=>e.target.style.borderColor=B.blue}
              onBlur={e=>e.target.style.borderColor=T.border}
            />

            {error && <div style={{background:isDark?"#2a0d0d":"#FEE2E2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#DC2626",marginBottom:14}}>⚠️ {error}</div>}

            <button onClick={generate} disabled={generating} style={{
              width:"100%",background:generating?"#94a3b8":B.blue,color:B.white,
              border:"none",borderRadius:10,padding:"15px 24px",fontSize:16,
              fontWeight:700,cursor:generating?"not-allowed":"pointer",transition:"background 0.2s",
            }}>
              {generating ? "✍️ Generating..." : `🚀 Generate ${selectedType.label} Blog`}
            </button>
          </div>
        )}

        {blog && (
          <div>
            {/* Action bar */}
            <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              <button onClick={() => { navigator.clipboard.writeText(blog); setCopied(true); setTimeout(()=>setCopied(false),2000); }} style={{background:copied?B.green:B.blue,color:B.white,border:"none",borderRadius:8,padding:"10px 18px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                {copied?"✅ Copied!":"📋 Copy Blog"}
              </button>
              <button onClick={handleSave} disabled={saved} style={{background:saved?B.green:"transparent",color:saved?B.white:B.blue,border:`2px solid ${saved?B.green:B.blue}`,borderRadius:8,padding:"10px 18px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                {saved?"✅ Saved to Library":"💾 Save to Library"}
              </button>
              <button onClick={()=>{setBlog("");setTopic("");setSaved(false);}} style={{background:"transparent",color:T.muted,border:`2px solid ${T.border}`,borderRadius:8,padding:"10px 18px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                ← New Blog
              </button>
              <div style={{marginLeft:"auto",fontSize:13,fontWeight:700,color:wcOk?B.green:B.red}}>
                {words} words {wcOk?"✅":words<1300?"⚠️ Too short":"⚠️ Too long"}
              </div>
            </div>

            <div style={{background:isDark?"#162035":"#EFF6FF",border:`1px solid ${B.blue}33`,borderRadius:10,padding:"10px 16px",marginBottom:14,fontSize:12,color:B.blue}}>
              <strong>⚠️ MANDATORY QA:</strong> Fact-check all sources at <a href="https://toolbox.google.com/factcheck/explorer/search/list:recent;hl=en" target="_blank" rel="noreferrer" style={{color:B.blue}}>Google Fact Check Explorer</a> before publishing.
            </div>

            <div style={{background:T.card,borderRadius:12,padding:28,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)",fontFamily:"'Georgia',serif",fontSize:14,lineHeight:1.85,color:T.text,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:"65vh",overflowY:"auto"}}>
              {blog}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// LIBRARY
// ═══════════════════════════════════════════════════════════════════════════════
function Library({ blogs, types, audiences, onDelete, T, isDark }) {
  const [filterType, setFilterType]     = useState("all");
  const [filterAud, setFilterAud]       = useState("all");
  const [selected, setSelected]         = useState(null);
  const [copied, setCopied]             = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const filtered = blogs
    .filter(b => filterType === "all" || b.typeId === filterType)
    .filter(b => filterAud  === "all" || b.audienceId === filterAud);

  if (selected) {
    const b = blogs.find(x => x.id === selected);
    if (!b) { setSelected(null); return null; }
    const wcOk = b.wordCount >= 1300 && b.wordCount <= 1400;
    return (
      <div>
        <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
          <button onClick={()=>setSelected(null)} style={{background:"transparent",color:B.blue,border:`2px solid ${B.blue}`,borderRadius:8,padding:"9px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>← Back to Library</button>
          <button onClick={()=>{navigator.clipboard.writeText(b.content);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{background:copied?B.green:B.blue,color:B.white,border:"none",borderRadius:8,padding:"9px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {copied?"✅ Copied!":"📋 Copy Blog"}
          </button>
          <div style={{marginLeft:"auto",fontSize:13,fontWeight:700,color:wcOk?B.green:B.red}}>{b.wordCount} words {wcOk?"✅":"⚠️"}</div>
        </div>
        <div style={{background:isDark?"#162035":"#EFF6FF",border:`1px solid ${B.blue}33`,borderRadius:10,padding:"10px 16px",marginBottom:14,fontSize:12,color:B.blue}}>
          <strong>⚠️ MANDATORY QA:</strong> Fact-check all sources at <a href="https://toolbox.google.com/factcheck/explorer/search/list:recent;hl=en" target="_blank" rel="noreferrer" style={{color:B.blue}}>Google Fact Check Explorer</a>.
        </div>
        <div style={{background:T.card,borderRadius:12,padding:28,border:`1px solid ${T.border}`,fontFamily:"'Georgia',serif",fontSize:14,lineHeight:1.85,color:T.text,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:"70vh",overflowY:"auto"}}>
          {b.content}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",gap:12,marginBottom:20,alignItems:"center",flexWrap:"wrap"}}>
        <h2 style={{margin:0,fontWeight:700,fontSize:22,color:B.blue}}>📚 Blog Library</h2>
        <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"}}>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{padding:"8px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,background:T.card,color:T.text,cursor:"pointer"}}>
            <option value="all">All Types</option>
            {types.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
          </select>
          <select value={filterAud} onChange={e=>setFilterAud(e.target.value)} style={{padding:"8px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,background:T.card,color:T.text,cursor:"pointer"}}>
            <option value="all">All Audiences</option>
            {audiences.map(a=><option key={a.id} value={a.id}>{a.emoji} {a.label}</option>)}
          </select>
        </div>
      </div>

      {filtered.length === 0 && (
        <div style={{background:T.card,borderRadius:12,padding:48,textAlign:"center",border:`1px solid ${T.border}`,color:T.muted,fontSize:15}}>
          📝 No blogs yet. Go to the Generator tab to write your first one.
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        {filtered.map(b => {
          const wcOk = b.wordCount >= 1300 && b.wordCount <= 1400;
          return (
            <div key={b.id} style={{background:T.card,borderRadius:12,padding:18,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
                <span style={{fontSize:22}}>{b.typeEmoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,lineHeight:1.4,marginBottom:4}}>{b.title}</div>
                  <div style={{fontSize:11,color:T.muted}}>{fmt(b.date)} · {b.audienceEmoji} {b.audienceLabel} · {b.typeLabel}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",marginTop:12}}>
                <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:wcOk?"#dcfce7":"#fee2e2",color:wcOk?B.green:B.red,fontWeight:700}}>
                  {wcOk?"✅":"⚠️"} {b.wordCount}w
                </span>
                <button onClick={()=>setSelected(b.id)} style={{background:B.blue,color:B.white,border:"none",borderRadius:7,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>View</button>
                {confirmDelete===b.id ? (
                  <>
                    <button onClick={()=>{onDelete(b.id);setConfirmDelete(null);}} style={{background:B.red,color:B.white,border:"none",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Confirm</button>
                    <button onClick={()=>setConfirmDelete(null)} style={{background:"transparent",color:T.muted,border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>Cancel</button>
                  </>
                ) : (
                  <button onClick={()=>setConfirmDelete(b.id)} style={{background:"transparent",color:T.muted,border:`1px solid ${T.border}`,borderRadius:7,padding:"5px 12px",fontSize:12,cursor:"pointer",marginLeft:"auto"}}>🗑️</button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// LINK TRACKER
// ═══════════════════════════════════════════════════════════════════════════════
function LinkTracker({ blogs, types, links, onToggle, T, isDark }) {
  const [filterType, setFilterType] = useState("all");
  const filtered = blogs.filter(b => filterType === "all" || b.typeId === filterType);
  const totalPairs = filtered.length * (filtered.length - 1);
  const doneLinks  = filtered.flatMap(a => filtered.filter(b => b.id !== a.id).map(b => links[`${a.id}__${b.id}`])).filter(Boolean).length;
  const pct = totalPairs > 0 ? Math.round((doneLinks/totalPairs)*100) : 0;

  return (
    <div>
      <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
        <h2 style={{margin:0,fontWeight:700,fontSize:22,color:B.blue}}>🔗 Internal Link Tracker</h2>
        <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
          <div style={{fontSize:13,fontWeight:700,color:pct===100?B.green:pct>=50?B.amber:B.red}}>
            {doneLinks} / {totalPairs} links confirmed ({pct}%)
          </div>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{padding:"8px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,background:T.card,color:T.text}}>
            <option value="all">All Types</option>
            {types.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
          </select>
        </div>
      </div>

      {blogs.length === 0 && (
        <div style={{background:T.card,borderRadius:12,padding:48,textAlign:"center",border:`1px solid ${T.border}`,color:T.muted,fontSize:15}}>
          No blogs yet. Generate some blogs first, then track their internal links here.
        </div>
      )}

      {filtered.length > 0 && (
        <div style={{background:T.card,borderRadius:12,padding:20,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)",overflowX:"auto"}}>
          <div style={{fontSize:12,color:T.muted,marginBottom:14}}>
            ✅ = link confirmed · □ = link not yet confirmed. Rows = source blog, Columns = linked blog.
          </div>
          <table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
            <thead>
              <tr>
                <th style={{padding:"8px 10px",textAlign:"left",background:T.rowBg2,borderRadius:"8px 0 0 0",minWidth:160,position:"sticky",left:0,zIndex:1}}>Source Blog →</th>
                {filtered.map(b=>(
                  <th key={b.id} style={{padding:"6px 8px",background:T.rowBg2,maxWidth:80,fontWeight:600,color:T.muted,textAlign:"center"}}>
                    <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:70,margin:"0 auto"}} title={b.title}>
                      {b.typeEmoji}
                    </div>
                    <div style={{fontSize:9,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:70}} title={b.title}>
                      {b.title.slice(0,20)}…
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(fromBlog => (
                <tr key={fromBlog.id}>
                  <td style={{padding:"8px 10px",background:T.suggBg,position:"sticky",left:0,zIndex:1,borderBottom:`1px solid ${T.border}`}}>
                    <div style={{fontWeight:600,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:150}} title={fromBlog.title}>
                      {fromBlog.typeEmoji} {fromBlog.title.slice(0,22)}…
                    </div>
                  </td>
                  {filtered.map(toBlog => {
                    const same = fromBlog.id === toBlog.id;
                    const key  = `${fromBlog.id}__${toBlog.id}`;
                    const done = links[key];
                    return (
                      <td key={toBlog.id} style={{textAlign:"center",padding:"4px",borderBottom:`1px solid ${T.border}`}}>
                        {same ? (
                          <div style={{background:"#E8EDF5",width:28,height:28,borderRadius:6,margin:"0 auto"}} />
                        ) : (
                          <button onClick={()=>onToggle(fromBlog.id, toBlog.id)} title={`${fromBlog.title} → ${toBlog.title}`} style={{
                            width:28,height:28,borderRadius:6,border:`2px solid ${done?B.green:T.border}`,
                            background:done?"#dcfce7":T.suggBg,cursor:"pointer",fontSize:14,
                            display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",
                            transition:"all 0.15s",
                          }}>
                            {done ? "✅" : "□"}
                          </button>
                        )}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// SETTINGS
// ═══════════════════════════════════════════════════════════════════════════════
function Settings({ types, audiences, onSaveTypes, onSaveAudiences, T, isDark }) {
  const [tab, setTab]           = useState("types");
  const [newType, setNewType]   = useState({ label:"", emoji:"📝", color:B.blue, protocol:"standard" });
  const [newAud, setNewAud]     = useState({ label:"", emoji:"👤" });
  const [saved, setSaved]       = useState("");
  const protocols = ["standard","home","commercial","life","barber","restaurant"];

  const addType = async () => {
    if (!newType.label.trim()) return;
    const t = [...types, { ...newType, id: newType.label.toLowerCase().replace(/\s+/g,"_") + "_" + uid() }];
    await onSaveTypes(t); setNewType({label:"",emoji:"📝",color:B.blue,protocol:"standard"});
    setSaved("type"); setTimeout(()=>setSaved(""),2000);
  };

  const removeType = async (id) => {
    if (DEFAULT_TYPES.find(t=>t.id===id)) return; // protect defaults
    await onSaveTypes(types.filter(t=>t.id!==id));
  };

  const addAudience = async () => {
    if (!newAud.label.trim()) return;
    const a = [...audiences, { ...newAud, id: newAud.label.toLowerCase().replace(/\s+/g,"_") + "_" + uid() }];
    await onSaveAudiences(a); setNewAud({label:"",emoji:"👤"});
    setSaved("aud"); setTimeout(()=>setSaved(""),2000);
  };

  const removeAudience = async (id) => {
    if (DEFAULT_AUDIENCES.find(a=>a.id===id)) return;
    await onSaveAudiences(audiences.filter(a=>a.id!==id));
  };

  const inp = (val,onChange,ph) => (
    <input value={val} onChange={e=>onChange(e.target.value)} placeholder={ph}
      style={{flex:1,padding:"9px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,outline:"none",boxSizing:"border-box",background:T.inputBg,color:T.text}} />
  );

  return (
    <div>
      <h2 style={{margin:"0 0 20px",fontWeight:700,fontSize:22,color:B.blue}}>⚙️ Settings</h2>
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        {["types","audiences"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            background:tab===t?B.blue:"transparent",color:tab===t?B.white:B.blue,
            border:`2px solid ${B.blue}`,borderRadius:8,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:"pointer",
          }}>{t==="types"?"📂 Blog Types":"👥 Audiences"}</button>
        ))}
      </div>

      {tab === "types" && (
        <div style={{background:T.card,borderRadius:12,padding:24,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16,color:B.blue}}>Add New Blog Type</div>
          <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
            {inp(newType.label, v=>setNewType(p=>({...p,label:v})), "Blog type name (e.g. HVAC)")}
            <input value={newType.emoji} onChange={e=>setNewType(p=>({...p,emoji:e.target.value}))} placeholder="Emoji"
              style={{width:70,padding:"9px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:18,textAlign:"center",background:T.inputBg,color:T.text}} />
            <input type="color" value={newType.color} onChange={e=>setNewType(p=>({...p,color:e.target.value}))}
              style={{width:50,height:40,padding:2,borderRadius:8,border:`1px solid ${T.border}`,cursor:"pointer"}} />
            <select value={newType.protocol} onChange={e=>setNewType(p=>({...p,protocol:e.target.value}))}
              style={{padding:"9px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:13,background:T.card,color:T.text}}>
              {protocols.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <button onClick={addType} style={{background:B.blue,color:B.white,border:"none",borderRadius:8,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              {saved==="type"?"✅ Added!":"+ Add Type"}
            </button>
          </div>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:T.muted}}>All Blog Types ({types.length})</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {types.map(t => {
              const isDefault = !!DEFAULT_TYPES.find(d=>d.id===t.id);
              return (
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:T.suggBg,borderRadius:10,border:`1px solid ${T.border}`}}>
                  <span style={{fontSize:20}}>{t.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{t.label}</div>
                    <div style={{fontSize:10,color:T.muted}}>Protocol: {t.protocol}</div>
                  </div>
                  <div style={{width:12,height:12,borderRadius:"50%",background:t.color,flexShrink:0}} />
                  {!isDefault && (
                    <button onClick={()=>removeType(t.id)} style={{background:"transparent",color:B.red,border:"none",cursor:"pointer",fontSize:16,padding:0}}>✕</button>
                  )}
                  {isDefault && <span style={{fontSize:10,color:T.muted}}>default</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab === "audiences" && (
        <div style={{background:T.card,borderRadius:12,padding:24,border:`1px solid ${T.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16,color:B.blue}}>Add New Audience</div>
          <div style={{display:"flex",gap:10,marginBottom:20}}>
            {inp(newAud.label, v=>setNewAud(p=>({...p,label:v})), "Audience name (e.g. Veterans)")}
            <input value={newAud.emoji} onChange={e=>setNewAud(p=>({...p,emoji:e.target.value}))} placeholder="Emoji"
              style={{width:70,padding:"9px 12px",borderRadius:8,border:`1px solid ${T.border}`,fontSize:18,textAlign:"center",background:T.inputBg,color:T.text}} />
            <button onClick={addAudience} style={{background:B.blue,color:B.white,border:"none",borderRadius:8,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              {saved==="aud"?"✅ Added!":"+ Add Audience"}
            </button>
          </div>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:T.muted}}>All Audiences ({audiences.length})</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {audiences.map(a => {
              const isDefault = !!DEFAULT_AUDIENCES.find(d=>d.id===a.id);
              return (
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:T.suggBg,borderRadius:10,border:`1px solid ${T.border}`}}>
                  <span style={{fontSize:22}}>{a.emoji}</span>
                  <div style={{flex:1,fontWeight:600,fontSize:13}}>{a.label}</div>
                  {!isDefault ? (
                    <button onClick={()=>removeAudience(a.id)} style={{background:"transparent",color:B.red,border:"none",cursor:"pointer",fontSize:16,padding:0}}>✕</button>
                  ) : <span style={{fontSize:10,color:T.muted}}>default</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<YDIBlogCenter />);
</script>
</body>
</html>
